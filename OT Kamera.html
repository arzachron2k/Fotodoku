<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SH-Schmiedel Foto-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .btn-sh { background-color: #2563eb; }
        #video-preview { 
            width: 100%; 
            height: 60vh; 
            object-fit: cover; 
            border-radius: 12px; 
            background: #000;
        }
        /* Verhindert iPhone-Vollbild-Gesten */
        video::-webkit-media-controls { display:none !important; }
        canvas { display: none; }
        #gallery { max-height: 80px; overflow-x: auto; white-space: nowrap; display: flex; gap: 4px; padding: 4px 0; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto h-full flex flex-col">
        <header class="mb-2 text-center">
            <h1 class="text-xl font-bold text-blue-500">SH-Schmiedel</h1>
            <p class="text-gray-400 text-[10px]">OT-FotoDokumentation v3.8</p>
        </header>

        <div id="setup-form" class="space-y-4">
            <input type="text" id="client-name" class="w-full p-4 rounded bg-gray-800 border border-gray-700" placeholder="Kunde">
            <input type="text" id="project-id" class="w-full p-4 rounded bg-gray-800 border border-gray-700" placeholder="Projekt">
            <button onclick="initCamera()" class="w-full btn-sh p-5 rounded-xl font-bold text-lg">Kamera starten</button>
        </div>

        <div id="camera-section" class="hidden flex-1 flex flex-col space-y-2">
            <div class="flex justify-between items-center gap-2">
                <div class="bg-gray-800 p-2 rounded text-[10px] flex-1 truncate">
                    <span id="display-info"></span> | <span id="photo-count" class="text-blue-400 font-bold">0 / 10</span>
                </div>
                <button onclick="sharePhotos()" id="share-btn" class="btn-sh px-4 py-2 rounded-lg font-bold text-sm hidden">📤 SENDEN</button>
            </div>
            
            <div class="relative flex-1">
                <video id="video-preview" autoplay playsinline webkit-playsinline muted preload="auto"></video>
                <div class="absolute bottom-4 left-0 right-0 flex justify-center z-50">
                    <button onclick="takePhoto()" class="bg-white h-14 w-14 rounded-full border-4 border-blue-500 flex items-center justify-center shadow-2xl active:scale-75 transition-transform">
                        <div class="h-10 w-10 rounded-full border-2 border-black"></div>
                    </button>
                </div>
            </div>
            
            <div id="gallery" class="py-1"></div>
            
            <button onclick="location.reload()" class="bg-gray-800 p-2 rounded-xl text-[10px] text-gray-400 w-full">Abbrechen</button>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        let photos = [];
        const maxPhotos = 10;

        async function initCamera() {
            const name = document.getElementById('client-name').value;
            const id = document.getElementById('project-id').value;
            if(!name || !id) return alert("Daten eingeben!");

            const video = document.getElementById('video-preview');
            
            // WICHTIG: Erst die iPhone-Regeln festlegen
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            video.setAttribute('muted', '');
            video.muted = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // Kurz warten bis Stream geladen, dann Play
                video.onloadedmetadata = () => {
                    video.play().catch(e => console.log("Auto-Play Blocked"));
                };

                document.getElementById('setup-form').classList.add('hidden');
                document.getElementById('camera-section').classList.remove('hidden');
                document.getElementById('display-info').innerText = `${name} | ${id}`;
            } catch (err) {
                alert("Kamera-Fehler. Bitte sicherstellen, dass Safari den Zugriff erlaubt.");
            }
        }

        function takePhoto() {
            if(photos.length >= maxPhotos) return;
            const video = document.getElementById('video-preview');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            const name = document.getElementById('client-name').value;
            const id = document.getElementById('project-id').value;
            const fontSize = Math.floor(canvas.width / 25);
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.fillStyle = "white"; ctx.shadowColor = "black"; ctx.shadowBlur = 10; ctx.textAlign = "right";
            ctx.fillText(`${name} - ${id}`, canvas.width - 40, canvas.height - 40);

            canvas.toBlob((blob) => {
                const newFile = new File([blob], `${name}_${photos.length + 1}.jpg`, { type: "image/jpeg" });
                photos.push(newFile);
                updateUI();
            }, "image/jpeg", 0.7);
        }

        function updateUI() {
            document.getElementById('photo-count').innerText = `${photos.length} / ${maxPhotos}`;
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "";
            photos.forEach(p => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(p);
                img.className = "h-12 w-12 object-cover rounded border border-blue-500 flex-shrink-0";
                gallery.prepend(img);
            });
            if(photos.length > 0) document.getElementById('share-btn').classList.remove('hidden');
        }

        async function sharePhotos() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        files: photos,
                        title: 'OT-FotoDokumentation',
                        text: 'Fotos für ' + document.getElementById('client-name').value
                    });
                } catch (e) { }
            }
        }
    </script>
</body>
</html>
