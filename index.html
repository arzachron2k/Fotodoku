<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SH-Schmiedel Foto-App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22SH-Schmiedel%20Doku%22,%22short_name%22:%22OT-Doku%22,%22display%22:%22standalone%22,%22start_url%22:%22.%22,%22background_color%22:%22%23121212%22,%22theme_color%22:%22%232563eb%22,%22icons%22:[{%22src%22:%22logo.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22,%22purpose%22:%22maskable%20any%22}]}">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .btn-sh { background-color: #2563eb; }
        /* Fix für die Sichtbarkeit: Video nimmt nur Restplatz ein */
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; flex: 1 min-content; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        .controls-area { display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem 0; flex-shrink: 0; }
        
        @media (orientation: landscape) {
            #setup-form { grid-template-columns: repeat(2, 1fr); display: grid; gap: 1rem; }
            .app-layout { flex-direction: row !important; gap: 1rem; }
            .video-wrapper { width: 60%; }
            .controls-area { width: 40%; justify-content: center; }
            header { display: none; }
        }
        
        #gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 80px; overflow-y: auto; }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 1/1; }
        canvas { position: fixed; left: -9999px; visibility: hidden; }
        select, input { background-color: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 1.5rem; justify-content: center; align-items: center; }
    </style>
</head>
<body class="p-3">

    <header class="relative mb-2 flex items-center justify-between flex-shrink-0 px-2 mt-4">
        <div onclick="toggleSettings(true)" class="text-blue-500 text-2xl cursor-pointer p-2">⚙️</div>
        <div class="text-center">
            <h1 class="text-xl font-bold text-blue-500 uppercase">SH-Schmiedel</h1>
            <p class="text-gray-400 text-[10px]">OT-Doku v7.4</p>
        </div>
        <div onclick="toggleHelp(true)" class="text-blue-500 text-3xl font-bold cursor-pointer p-2">?</div>
    </header>

    <div id="setup-form" class="space-y-3 my-auto w-full max-w-lg mx-auto">
        <select id="staff-name" onchange="saveLastStaff()" class="w-full p-4 rounded-lg font-bold shadow-lg"></select>
        <input type="text" id="client-name" class="w-full p-4 rounded-lg uppercase" placeholder="Kunde (NAME, Vorname)">
        <input type="text" id="project-dob" class="w-full p-4 rounded-lg" placeholder="Geburtsdatum">
        <input type="text" id="product-info" class="w-full p-4 rounded-lg" placeholder="Versorgung / Produkt">
        <button onclick="initCamera()" class="w-full btn-sh p-5 rounded-xl font-bold text-lg shadow-xl uppercase">📸 Kamera starten</button>
    </div>

    <div id="camera-section" class="hidden h-[90vh] flex flex-col app-layout overflow-hidden">
        <div class="video-wrapper">
            <video id="video-preview" autoplay playsinline muted></video>
            <div class="absolute bottom-4 left-0 right-0 flex justify-center z-50">
                <button onclick="takePhoto()" class="bg-white h-16 w-16 rounded-full border-4 border-blue-500 shadow-2xl active:scale-95 transition-transform flex items-center justify-center">
                    <div class="h-12 w-12 rounded-full border-2 border-black"></div>
                </button>
            </div>
        </div>

        <div class="controls-area">
            <div class="flex justify-between items-center gap-2">
                <div class="bg-gray-800 p-2 rounded text-[9px] flex-1 truncate border border-gray-700 text-blue-400 uppercase">
                    <span id="display-info"></span> | <span id="photo-count" class="font-bold text-white">0 / 10</span>
                </div>
                <button onclick="sharePhotos()" id="share-btn" class="btn-sh px-4 py-2 rounded-lg font-bold text-sm hidden shadow-lg uppercase">📤 Senden</button>
            </div>
            
            <div id="gallery" class="bg-gray-900/50 rounded-lg p-1"></div>
            
            <button onclick="location.reload()" class="w-full py-3 rounded-xl bg-red-900/30 border border-red-500/50 text-red-400 text-xs font-bold uppercase tracking-widest mt-1">
                ✕ Vorgang Abbrechen
            </button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay" onclick="toggleSettings(false)">
        <div class="bg-gray-800 p-6 rounded-2xl w-full max-w-sm border border-blue-500 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold text-blue-500 mb-4 flex items-center gap-2">⚙️ Team</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="new-staff-name" class="flex-1 p-2 rounded bg-gray-900 border border-gray-700 text-sm" placeholder="Name">
                <button onclick="addStaffMember()" class="bg-blue-600 px-4 py-2 rounded font-bold">+</button>
            </div>
            <div id="staff-list-admin" class="space-y-2 max-h-48 overflow-y-auto mb-4 bg-gray-900 p-2 rounded text-sm text-gray-200"></div>
            <button onclick="toggleSettings(false)" class="w-full bg-gray-700 py-3 rounded-xl font-bold">Schließen</button>
        </div>
    </div>

    <div id="help-modal" class="modal-overlay" onclick="toggleHelp(false)">
        <div class="bg-gray-800 p-6 rounded-2xl max-w-sm border border-blue-500 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold text-blue-500 mb-4 text-center">Anleitung</h2>
            <div class="space-y-4 text-sm text-gray-200">
                <p><b>1. Start:</b> Mitarbeiter & Kundendaten eingeben.</p>
                <p><b>2. Kamera:</b> Fotos knipsen (max. 10). Diese werden automatisch gestempelt.</p>
                <p><b>3. Abschluss:</b> Auf "Senden" klicken und App wählen (Teams/Mail).</p>
            </div>
            <button onclick="toggleHelp(false)" class="w-full btn-sh mt-6 py-3 rounded-xl font-bold">Alles klar!</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        let photos = [];
        let staffList = JSON.parse(localStorage.getItem('sh_staff')) || ["Christian"]; 
        const bannerImg = new Image(); bannerImg.src = "banner.png"; 

        window.onload = () => { renderStaffLists(); };

        function renderStaffLists() {
            const select = document.getElementById('staff-name');
            const adminList = document.getElementById('staff-list-admin');
            const lastStaff = localStorage.getItem('sh_last_staff');
            
            select.innerHTML = '<option value="" disabled selected>Wer macht die Bilder?</option>';
            staffList.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                if(name === lastStaff) opt.selected = true;
                select.appendChild(opt);
            });

            adminList.innerHTML = "";
            staffList.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-gray-900 p-2 rounded border border-gray-700 mb-1";
                div.innerHTML = `<span>${name}</span><button onclick="removeStaffMember(${index})" class="text-red-500 font-bold px-2">✕</button>`;
                adminList.appendChild(div);
            });
            localStorage.setItem('sh_staff', JSON.stringify(staffList));
        }

        function saveLastStaff() { localStorage.setItem('sh_last_staff', document.getElementById('staff-name').value); }
        function addStaffMember() {
            const input = document.getElementById('new-staff-name');
            if(input.value.trim()) { staffList.push(input.value.trim()); input.value = ""; renderStaffLists(); }
        }
        function removeStaffMember(index) { staffList.splice(index, 1); renderStaffLists(); }

        function toggleSettings(show) { document.getElementById('settings-modal').style.display = show ? 'flex' : 'none'; }
        function toggleHelp(show) { document.getElementById('help-modal').style.display = show ? 'flex' : 'none'; }

        async function initCamera() {
            const staff = document.getElementById('staff-name').value;
            const name = document.getElementById('client-name').value;
            if(!staff || !name) return alert("Mitarbeiter und Kunde fehlen!");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } });
                document.getElementById('video-preview').srcObject = stream;
                document.getElementById('setup-form').classList.add('hidden');
                document.getElementById('camera-section').classList.remove('hidden');
                document.getElementById('display-info').innerText = `${name} | ${staff}`;
            } catch (err) { alert("Kamera-Fehler"); }
        }

        function takePhoto() {
            if(photos.length >= 10) return;
            const video = document.getElementById('video-preview');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            if(bannerImg.complete) {
                ctx.save();
                ctx.globalCompositeOperation = "multiply"; 
                const bW = canvas.width * 0.20;
                const bH = (bannerImg.naturalHeight / bannerImg.naturalWidth) * bW;
                ctx.drawImage(bannerImg, canvas.width - bW - 40, 40, bW, bH);
                ctx.restore();
            }

            const staff = document.getElementById('staff-name').value;
            const name = document.getElementById('client-name').value;
            const dob = document.getElementById('project-dob').value;
            const product = document.getElementById('product-info').value;
            const footer = `Foto Doku für KV ${name} (${dob}) - ${product} - Erstellt von: ${staff}`;
            
            ctx.font = `bold ${Math.floor(canvas.width/60)}px sans-serif`;
            ctx.fillStyle = "white"; ctx.textAlign = "right";
            ctx.shadowColor = "black"; ctx.shadowBlur = 4;
            ctx.fillText(footer, canvas.width - 40, canvas.height - 40);

            canvas.toBlob((blob) => {
                const safeName = name.replace(/[^a-z0-9]/gi, '_').substring(0,15);
                const file = new File([blob], `Doku_${safeName}_${photos.length+1}.jpg`, { type: "image/jpeg" });
                photos.push(file); updateUI();
            }, "image/jpeg", 0.9);
        }

        function updateUI() {
            document.getElementById('photo-count').innerText = `${photos.length} / 10`;
            const gallery = document.getElementById('gallery'); gallery.innerHTML = "";
            photos.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = "thumb-container";
                div.innerHTML = `<img src="${URL.createObjectURL(p)}" class="w-full h-full object-cover rounded-lg border border-blue-500 shadow-md">`;
                gallery.prepend(div);
            });
            document.getElementById('share-btn').classList.toggle('hidden', photos.length === 0);
        }

        async function sharePhotos() {
            const name = document.getElementById('client-name').value;
            const dob = document.getElementById('project-dob').value;
            const product = document.getElementById('product-info').value;
            const title = `Foto Doku für KV ${name}, geb. ${dob}, ${product}`;
            if (navigator.share) {
                try { await navigator.share({ files: photos, title: title, text: title }); } catch (e) {}
            }
        }
    </script>
</body>
</html>
