<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SH-Schmiedel Foto-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .btn-sh { background-color: #2563eb; }
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; flex-grow: 1; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        .controls-area { display: flex; flex-direction: column; gap: 0.5rem; padding-top: 0.5rem; }
        @media (orientation: landscape) {
            .app-layout { flex-direction: row !important; gap: 1rem; }
            .video-wrapper { width: 65%; }
            .controls-area { width: 35%; }
            header { display: none; }
            #gallery { grid-template-columns: repeat(3, 1fr) !important; max-height: none !important; overflow-y: auto; }
        }
        #gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; max-height: 80px; overflow-y: auto; }
        canvas { position: fixed; left: -9999px; visibility: hidden; }
        video::-webkit-media-controls { display:none !important; }
        .mail-shortcut { cursor: pointer; transition: transform 0.1s; }
        .mail-shortcut:active { transform: scale(0.8); }
    </style>
</head>
<body class="p-3">
    <div class="max-w-5xl mx-auto h-full flex flex-col app-layout">
        <header class="relative mb-2 flex items-center justify-center flex-shrink-0">
            <div onclick="sharePhotos()" class="absolute left-0 text-blue-500 text-3xl font-bold mail-shortcut">@</div>
            <div class="text-center">
                <h1 class="text-xl font-bold text-blue-500">SH-Schmiedel</h1>
                <p class="text-gray-400 text-[10px]">OT-FotoDokumentation v4.5</p>
            </div>
        </header>

        <div id="setup-form" class="space-y-4 my-auto">
            <input type="text" id="client-name" class="w-full p-4 rounded bg-gray-800 border border-gray-700" placeholder="Kunde">
            <input type="text" id="project-id" class="w-full p-4 rounded bg-gray-800 border border-gray-700" placeholder="Projekt">
            <button onclick="initCamera()" class="w-full btn-sh p-5 rounded-xl font-bold text-lg shadow-lg">Kamera starten</button>
        </div>

        <div id="camera-section" class="hidden h-full flex flex-col app-layout overflow-hidden">
            <div class="video-wrapper">
                <video id="video-preview" autoplay playsinline webkit-playsinline muted></video>
                <div class="absolute bottom-4 left-0 right-0 flex justify-center z-50">
                    <button onclick="takePhoto()" class="bg-white h-14 w-14 rounded-full border-4 border-blue-500 flex items-center justify-center shadow-2xl active:scale-75 transition-transform">
                        <div class="h-10 w-10 rounded-full border-2 border-black"></div>
                    </button>
                </div>
            </div>
            <div class="controls-area">
                <div class="flex justify-between items-center gap-2">
                    <div class="bg-gray-900/80 p-2 rounded text-[10px] flex-1 truncate border border-gray-700 text-blue-400">
                        <span id="display-info"></span> | <span id="photo-count" class="font-bold">0 / 10</span>
                    </div>
                    <button onclick="sharePhotos()" id="share-btn" class="btn-sh px-4 py-2 rounded-lg font-bold text-sm hidden shadow-lg">📤 SENDEN</button>
                </div>
                <div id="gallery"></div>
                <button onclick="location.reload()" class="bg-gray-800 p-2 rounded-xl text-[10px] text-gray-400 w-full mt-auto">Abbrechen</button>
            </div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        let photos = [];
        const maxPhotos = 10;
        const logo = new Image();
        logo.crossOrigin = "anonymous";
        logo.src = "https://sanitätshaus-schmiedel.de/wp-content/uploads/2016/10/logo_home.png";

        async function initCamera() {
            const name = document.getElementById('client-name').value;
            const id = document.getElementById('project-id').value;
            if(!name || !id) return alert("Daten eingeben!");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: false 
                });
                const video = document.getElementById('video-preview');
                video.srcObject = stream;
                video.play();
                document.getElementById('setup-form').classList.add('hidden');
                document.getElementById('camera-section').classList.remove('hidden');
                document.getElementById('display-info').innerText = `${name} | ${id}`;
            } catch (err) { alert("Kamera-Fehler"); }
        }

        function takePhoto() {
            if(photos.length >= maxPhotos) return;
            const video = document.getElementById('video-preview');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            const name = document.getElementById('client-name').value;
            const id = document.getElementById('project-id').value;
            
            // 1. Text-Stempel unten rechts (Wiederhergestellt)
            const fontSize = Math.floor(canvas.width / 30);
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.fillStyle = "white"; 
            ctx.shadowColor = "black"; 
            ctx.shadowBlur = 8; 
            ctx.textAlign = "right";
            ctx.fillText(`Kostenvoranschlag für ${name} - ${id}`, canvas.width - 40, canvas.height - 40);

            // 2. Logo oben rechts
            if(logo.complete && logo.naturalWidth !== 0) {
                const logoWidth = canvas.width * 0.25;
                const logoHeight = (logo.naturalHeight / logo.naturalWidth) * logoWidth;
                ctx.globalAlpha = 0.85;
                ctx.shadowBlur = 0;
                ctx.drawImage(logo, canvas.width - logoWidth - 40, 40, logoWidth, logoHeight);
                ctx.globalAlpha = 1.0;
            }

            canvas.toBlob((blob) => {
                const newFile = new File([blob], `${name}_${photos.length + 1}.jpg`, { type: "image/jpeg" });
                photos.push(newFile);
                updateUI();
            }, "image/jpeg", 0.85);
        }

        function updateUI() {
            document.getElementById('photo-count').innerText = `${photos.length} / ${maxPhotos}`;
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "";
            photos.forEach(p => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(p);
                img.className = "w-full aspect-square object-cover rounded border border-blue-500";
                gallery.prepend(img);
            });
            if(photos.length > 0) document.getElementById('share-btn').classList.remove('hidden');
        }

        async function sharePhotos() {
            const name = document.getElementById('client-name').value;
            const id = document.getElementById('project-id').value;
            if (navigator.share && photos.length > 0) {
                try {
                    await navigator.share({
                        files: photos,
                        title: `Kostenvoranschlag für ${name} + ${id}`,
                        text: `Anbei die Fotodokumentation für den Auftrag: ${name} (${id}).`
                    });
                } catch (e) { }
            }
        }
    </script>
</body>
</html>
